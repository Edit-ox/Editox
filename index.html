<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editox</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
    footer {
  position: fixed;      /* keeps it at bottom */
  bottom: 0;            /* stick to bottom */
  left: 0;              /* align left */
  width: 100%;
  text-align: left;     /* move text to left */
  padding: 10px 15px;   /* little space from edge */
  background: #0f0f0f;
  color: #777;          /* softer color */
  font-size: 12px;      /* smaller text */
    }
footer {
  background: #0f0f0f;
  padding: 25px 10px 15px;
  text-align: center;
  border-top: 1px solid #222;
}

/* Social Media Section */
.social-section {
  margin-bottom: 10px;
}

.social-section a {
  margin: 0 12px;
  display: inline-block;
}

.social-section img {
  width: 22px;
  height: 22px;
  filter: brightness(0.8);
  transition: 0.3s;
}

.social-section img:hover {
  filter: brightness(1.5);
  transform: scale(1.1);
}

/* Copyright */
.copyright {
  font-size: 12px;
  color: #777;
}
  .image-box {
  position: relative;
  width: 80%;
  max-width: 600px;
  margin: 50px auto;
  border-radius: 20px;
  overflow: hidden;
}

.image-box img {
  width: 100%;
  display: block;
}

.text-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
}

.text-overlay h2 {
  font-size: 36px;
  font-family: 'Playfair Display', serif;
  text-shadow: 0 4px 15px rgba(0,0,0,0.8);
}
    .hero-title {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 700;
  color: white;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
    }
    }
  </style>
</head>
<body>

<header>
  <!-- Left: Menu Button -->
  <div class="menu-btn" onclick="toggleMenu()"> ☰ </div>

  <!-- Center: Channel Name -->
  <div class="channel-name"> Editox</div>

  <!-- Right: Logo -->
  <div class="logo">
    <img src="Black and White Minimalist Modern Creative Design Logo_20260301_202204_0000.png" alt="Editox Logo">
  </div>
</header>

<!-- One-line tagline / separator -->
<div class="tagline">CineEditography</div>

<!-- Hidden menu -->
<nav id="menu">
  <a href="index.html">Home</a>
  <a href="#">coming soon</a>
  <a href="#">.....</a>
  <a href="#">.....</a>
  <a href="#">.....</a>
</nav>

<div class="image-box">
  <img src="pexels-mikebirdy-132774.jpg" alt="Cinematic Edit">
  <div class="text-overlay">
    <h2 class="hero-title">Welcome to Editox</h2>
  </div>
</div>
<script>
  function toggleMenu() {
    const menu = document.getElementById('menu');
    menu.classList.toggle('show'); // toggle the "show" class
  }
</script>
<footer>
  <div class="social-section">
    <a href="https://www.instagram.com/editox.x?igsh=d2VhdXJzY201azNx" target="_blank">
      <img src="instagram.png" alt="">
    </a>
    <a href="https://www.youtube.com/@Ediito-x" target="_blank">
      <img src="youtube.png" alt="">
    </a>
    <a href="https://github.com/Edit-ox" target="_blank">
      <img src="github.png" alt="">
    </a>
  </div>

  <p class="copyright">
    © 2026 Editox. All Rights Reserved.
  </p>
</footer>
</body>
</html>
